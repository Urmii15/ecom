<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
</head>
<body>
    <!-- navbar -->

    <header>
    <a href="#" class="logo"><i class='bx bxs-t-shirt'></i> adidas </a>

    <ul class="navbar">
        <li><a href="#home">Home</a></li>
        <li><a href="#new">New Arrival</a></li>
        <li><a href="#products">Products</a></li>
        <li><a href="#reviews">Reviews</a></li>
    </ul>

    <!-- Icons -->
    <div class="header-icons">
        <i class='bx bx-menu' id="menu-icon"></i>
        <i class='bx bx-search' id="search-icon"></i>
        <i class='bx bx-cart-alt' id="cart-icon"></i>
        <i class='bx bx-user' id="user-icon"></i>
    </div>

    <div class="search-box">
        <input type="search" placeholder="search here...">
    </div>

    <!-- Cart Box -->
<div class="cart">
    <!-- Box 1 -->
    <div class="box">
        <img src="img/new1.png" alt="">
        <div class="text">
            <h3>T-Shirt 14A</h3>
            <span>$50.05</span>
            <span>x1</span>
        </div>
        <i class='bx bxs-trash-alt'></i>
    </div>
    <h2>Total: 1000</h2>
    <a href="#" class="btn">Checkout</a>

    
    <!-- Box 2 -->
    <div class="box">
        <img src="img/new2.png" alt="">
        <div class="text">
            <h3>T-Shirt 14A</h3>
            <span>$50.05</span>
            <span>x1</span>
        </div>
        <i class='bx bxs-trash-alt'></i>
    </div>
    <h2>Total: 1000</h2>
    <a href="#" class="btn">Checkout</a>
</div>


<!-- USER  -->

<div class="user">
    <h2>Login Now</h2>
    <input type="email" placeholder="Enter your mail id.." name="" id="">
    <input type="password" placeholder="password" id="">
    <input type="submit" value="Login" class="login-btn">
    <p>Forget Password<a href="#">Reset Now</a></p>
    <p>Don't have Account <a href="#">Create Account</a></p>
</div>


</header>
<!-- <script src="main.js"></script> -->
</body>
</html>
